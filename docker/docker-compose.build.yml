services:
  aiclient-api:
    # 方式二：从 Dockerfile 本地构建
    # 使用方法: docker compose -f docker-compose.build.yml up -d --build
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: aiclient2api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8085-8087:8085-8087" 
      - "1455:1455"
      # OAuth 固定回调：宿主机浏览器 -> localhost:19876 -> 容器内 mcporter 监听（与 CONSENSUS_MCPORTER_OAUTH_REDIRECT_URL 一致）
      - "19876:19876"
      - "19877-19880:19877-19880"
    volumes:
      - ./configs:/app/configs
      - ./logs:/app/logs
      # mcporter OAuth 持久化：Linux 下 vault 为 $HOME/.mcporter/credentials.json（含 access_token / refresh_token）
      - ./mcporter-data:/app/.mcporter
    environment:
      - ARGS=
      # 与 Dockerfile 一致，使 mcporter 将 ~/.mcporter 落在 /app/.mcporter 并随卷持久化
      - HOME=/app
      # 固定 OAuth 回调 URL；API 启动后长期监听该端口（共享 Hub）；生成授权时仅注册处理函数，不关闭监听
      - CONSENSUS_MCPORTER_OAUTH_REDIRECT_URL=http://localhost:19876/callback
      # 可选：等待浏览器回调的最长时间（毫秒），默认 120000；回调未到会先报 OAuthTimeoutError
      # - CONSENSUS_MCPORTER_OAUTH_TIMEOUT_MS=300000
      - TRACE_LOG_DB_PATH=/app/logs/aiclient2api-trace.db
      - TRACE_LOG_MAX_DAYS=30
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3