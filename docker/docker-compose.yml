services:
  aiclient-api:
    # 方式一：使用 Docker Hub 预构建镜像（默认，推荐）
    # 使用方法: docker compose up -d
    image: justlikemaki/aiclient-2-api:latest
    container_name: aiclient2api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8085-8087:8085-8087" 
      - "1455:1455"
      - "19876-19880:19876-19880"
    volumes:
      - ./configs:/app/configs
      # 持久化 SQLite 全链路日志（TRACE_LOG_DB_PATH 默认 ./logs/aiclient2api-trace.db）
      - ./logs:/app/logs
    environment:
      - ARGS=
      # 可选：显式指定库路径（与上面卷一致时保持默认即可）
      - TRACE_LOG_DB_PATH=/app/logs/aiclient2api-trace.db
      - TRACE_LOG_MAX_DAYS=30
      # 可选：非流式自动续写（max_tokens/length 截断时），0=关闭
      # - CONTINUATION_MAX_ROUNDS=2
      # - CONTINUATION_PROMPT=Continue
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
